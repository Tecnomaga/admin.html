<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin – Poke Fish</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD966;
            --gold-dark: #3A2E1C;
            --bg: #1a0f08;
            --panel: #2c1f14;
            --border: #5C3E2C;
        }
        * { margin: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 1100px; width: 100%; }
        .hidden { display: none !important; }

        .login-card {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .login-card h2 {
            color: var(--gold);
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #2a1f14;
            color: #eee;
            font-size: 14px;
        }
        .login-card button {
            background: var(--gold);
            color: #1a0f08;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: 0.2s;
        }
        .login-card button:hover { opacity: 0.85; }
        .msg { color: #ff6b6b; margin-top: 10px; font-size: 13px; }
        .msg.success { color: #51cf66; }

        .panel {
            background: var(--panel);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(255, 215, 100, 0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .header h1 {
            font-family: 'Press Start 2P', cursive;
            color: var(--gold);
            font-size: 16px;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .logout-btn:hover { background: #ff6b6b; color: #000; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px;
            background: #2a1f14;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            color: #ccc;
            font-weight: bold;
        }
        .tab.active {
            background: var(--gold);
            color: #1a0f08;
            border-color: var(--gold);
        }

        .tools-section {
            background: #1f140e;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .tools-section h3 {
            color: var(--gold);
            font-size: 14px;
            margin-bottom: 15px;
            font-family: 'Press Start 2P', cursive;
        }
        .tool-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .tool-row input {
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #2a1f14;
            color: #eee;
            font-size: 13px;
            flex: 1;
            min-width: 180px;
        }
        .tool-row input::placeholder { color: #887a6a; }
        .tool-row button {
            background: var(--gold);
            color: #1a0f08;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .tool-row button:hover { opacity: 0.85; }
        .tool-row button.nerf-btn { background: #e74c3c; color: white; }
        .tool-row button.buff-btn { background: #4CAF50; color: white; }
        .tool-row button.reset-btn { background: #f39c12; color: white; }
        .tool-row label {
            font-size: 12px;
            color: #ccc;
            min-width: 100px;
        }
        .tool-row select {
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #2a1f14;
            color: #eee;
            font-size: 13px;
        }
        .tool-result {
            font-size: 12px;
            margin-top: 8px;
            min-height: 18px;
            color: #51cf66;
        }
        .tool-result.error { color: #ff6b6b; }

        .transactions-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .tx-card {
            background: #1f140e;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            transition: 0.2s;
        }
        .tx-card:hover { border-color: var(--gold); }
        .tx-info p { margin: 4px 0; font-size: 14px; }
        .tx-info strong { color: var(--gold); }
        .detail-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .detail-btn:hover { background: var(--gold); color: #000; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .modal {
            background: var(--panel);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            position: relative;
        }
        .modal h3 {
            color: var(--gold);
            margin-bottom: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
        }
        .modal p { margin: 8px 0; }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .approve, .reject {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .approve { background: #4CAF50; color: white; }
        .reject { background: #e74c3c; color: white; }
        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            background: none;
            border: none;
            color: #ccc;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login -->
        <div id="loginScreen" class="login-card">
            <h2>Painel Admin</h2>
            <input id="adminUser" placeholder="Usuário">
            <input id="adminPass" type="password" placeholder="Senha">
            <button onclick="doLogin()">Entrar</button>
            <div id="loginMsg" class="msg"></div>
        </div>

        <!-- Painel -->
        <div id="adminPanel" class="panel hidden">
            <div class="header">
                <h1>🎣 Poke Fish</h1>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>

            <!-- Ferramentas Administrativas -->
            <div class="tools-section">
                <h3>🛠️ Ferramentas</h3>
                
                <!-- Buscar TXID -->
                <div class="tool-row">
                    <input type="text" id="searchTxidInput" placeholder="TXID ou ID da transação...">
                    <button onclick="searchTxid()">🔍 Buscar</button>
                </div>
                <div id="searchTxidResult" class="tool-result"></div>

                <hr style="border-color: var(--border); margin: 15px 0;">

                <!-- Modificador de Captura -->
                <div class="tool-row">
                    <label>Username:</label>
                    <input type="text" id="modifierUsername" placeholder="Nome do jogador">
                    <label>Modificador:</label>
                    <select id="modifierType">
                        <option value="buff">🟢 Buff (+)</option>
                        <option value="nerf">🔴 Nerf (-)</option>
                    </select>
                    <input type="number" id="modifierValue" placeholder="%" min="0" max="100" value="10">
                    <button onclick="setCatchModifier()">✅ Aplicar</button>
                </div>
                <div id="modifierResult" class="tool-result"></div>

                <hr style="border-color: var(--border); margin: 15px 0;">

                <!-- Verificar Modificador -->
                <div class="tool-row">
                    <label>Verificar:</label>
                    <input type="text" id="checkModifierUsername" placeholder="Username do jogador">
                    <button onclick="checkModifier()">🔍 Verificar</button>
                    <button onclick="resetModifier()" class="reset-btn">🔄 Resetar</button>
                </div>
                <div id="checkModifierResult" class="tool-result"></div>
            </div>

            <!-- Abas -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab('deposit')">Depósitos</div>
                <div class="tab" onclick="switchTab('withdraw')">Saques</div>
            </div>

            <div id="depositList" class="transactions-list"></div>
            <div id="withdrawList" class="transactions-list hidden"></div>
            <div id="panelMsg" class="msg" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- Modal genérico -->
    <div id="txModal" class="modal-overlay hidden">
        <div class="modal">
            <button class="close-modal" onclick="closeModal()">✖</button>
            <h3 id="modalTitle"></h3>
            <div id="modalContent"></div>
            <div class="modal-actions">
                <button class="reject" onclick="processTx('rejected')">❌ Rejeitar</button>
                <button class="approve" onclick="processTx('approved')">✅ Aprovar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://pokefish-backend.onrender.com/api';
        let token = '', currentTab = 'deposit', allTx = [], selectedTx = null;

        async function doLogin() {
            const u = document.getElementById('adminUser').value.trim();
            const p = document.getElementById('adminPass').value.trim();
            const msg = document.getElementById('loginMsg');
            if (!u || !p) return msg.textContent = 'Preencha os campos.';
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Erro');
                const payload = JSON.parse(atob(data.token.split('.')[1]));
                if (payload.role !== 'admin') throw new Error('Apenas admins.');
                token = data.token;
                localStorage.setItem('admin_token', token);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadTransactions();
            } catch (e) { msg.textContent = e.message; }
        }

        async function loadTransactions() {
            try {
                const res = await fetch(`${API_URL}/admin/transactions`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Erro ao carregar');
                allTx = await res.json();
                renderCards();
            } catch (e) {
                document.getElementById('panelMsg').textContent = e.message;
            }
        }

        function renderCards() {
            const depContainer = document.getElementById('depositList');
            const witContainer = document.getElementById('withdrawList');
            depContainer.innerHTML = '';
            witContainer.innerHTML = '';
            const deposits = allTx.filter(t => t.type === 'deposit');
            const withdraws = allTx.filter(t => t.type === 'withdraw');
            [deposits, withdraws].forEach((list, idx) => {
                const container = idx === 0 ? depContainer : witContainer;
                if (list.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">Nenhuma transação.</p>';
                    return;
                }
                list.forEach(tx => {
                    const card = document.createElement('div');
                    card.className = 'tx-card';
                    card.innerHTML = `
                        <div class="tx-info">
                            <p><strong>${tx.username}</strong> – ${tx.type === 'deposit' ? 'Depósito' : 'Saque'}</p>
                            <p>${tx.amountCoins} moedas ($${tx.amountUSD})</p>
                        </div>
                        <button class="detail-btn" onclick="openModal('${tx._id}')">Ver detalhes</button>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab === 'deposit' ? 'depositList' : 'withdrawList').classList.remove('hidden');
            document.getElementById(tab === 'withdraw' ? 'depositList' : 'withdrawList').classList.add('hidden');
            document.querySelector(`.tab:nth-child(${tab === 'deposit' ? 1 : 2})`).classList.add('active');
        }

        function openModal(id) {
            selectedTx = allTx.find(t => t._id === id);
            if (!selectedTx) return;
            document.getElementById('modalTitle').textContent = selectedTx.type === 'deposit' ? 'Depósito' : 'Saque';
            document.getElementById('modalContent').innerHTML = `
                <p><strong>Usuário:</strong> ${selectedTx.username}</p>
                <p><strong>Quantidade:</strong> ${selectedTx.amountCoins} moedas ($${selectedTx.amountUSD})</p>
                ${selectedTx.txid ? `<p><strong>TXID:</strong> <span id="modalTxid">${selectedTx.txid}</span> <button onclick="copyText('modalTxid')">📋</button></p>` : ''}
                ${selectedTx.wallet ? `<p><strong>Carteira:</strong> <span id="modalWallet">${selectedTx.wallet}</span> <button onclick="copyText('modalWallet')">📋</button></p>` : ''}
            `;
            document.getElementById('txModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('txModal').classList.add('hidden');
            selectedTx = null;
            const approveBtn = document.querySelector('.approve');
            const rejectBtn = document.querySelector('.reject');
            if (approveBtn) approveBtn.disabled = false;
            if (rejectBtn) rejectBtn.disabled = false;
        }

        async function processTx(action) {
            if (!selectedTx) return;
            const approveBtn = document.querySelector('.approve');
            const rejectBtn = document.querySelector('.reject');
            if (approveBtn) approveBtn.disabled = true;
            if (rejectBtn) rejectBtn.disabled = true;
            try {
                const res = await fetch(`${API_URL}/admin/approve`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ transactionId: selectedTx._id, action })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);
                document.getElementById('panelMsg').textContent = 
                    `Transação ${action === 'approved' ? 'aprovada' : 'rejeitada'}!`;
                document.getElementById('panelMsg').className = 'msg success';
                closeModal();
                loadTransactions();
            } catch (e) {
                alert('Erro: ' + e.message);
                if (approveBtn) approveBtn.disabled = false;
                if (rejectBtn) rejectBtn.disabled = false;
            }
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => alert('Copiado!'));
        }

        // ========== BUSCAR TXID ==========
        async function searchTxid() {
            const txid = document.getElementById('searchTxidInput').value.trim();
            const resultEl = document.getElementById('searchTxidResult');
            if (!txid) {
                resultEl.textContent = 'Digite um TXID para buscar.';
                resultEl.className = 'tool-result error';
                return;
            }
            resultEl.textContent = 'Buscando...';
            resultEl.className = 'tool-result';
            try {
                const res = await fetch(`${API_URL}/admin/search-txid?txid=${encodeURIComponent(txid)}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);
                if (data.length === 0) {
                    resultEl.textContent = 'Nenhuma transação encontrada.';
                    resultEl.className = 'tool-result error';
                } else {
                    resultEl.innerHTML = data.map(tx => 
                        `<p>👤 <strong>${tx.username}</strong> – ${tx.type} – ${tx.amountCoins} moedas – Status: ${tx.status} – TXID: ${tx.txid || 'N/A'}</p>`
                    ).join('');
                    resultEl.className = 'tool-result';
                }
            } catch (e) {
                resultEl.textContent = 'Erro: ' + e.message;
                resultEl.className = 'tool-result error';
            }
        }

        // ========== MODIFICADOR DE CAPTURA ==========
        async function setCatchModifier() {
            const username = document.getElementById('modifierUsername').value.trim();
            const type = document.getElementById('modifierType').value;
            const value = parseInt(document.getElementById('modifierValue').value) || 0;
            const resultEl = document.getElementById('modifierResult');

            if (!username) {
                resultEl.textContent = 'Digite o nome do jogador.';
                resultEl.className = 'tool-result error';
                return;
            }
            if (value < 0 || value > 100) {
                resultEl.textContent = 'Valor deve estar entre 0 e 100.';
                resultEl.className = 'tool-result error';
                return;
            }

            const modifier = type === 'nerf' ? -(value / 100) : (value / 100);
            resultEl.textContent = 'Aplicando...';
            resultEl.className = 'tool-result';

            try {
                const res = await fetch(`${API_URL}/admin/set-catch-modifier`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ username, modifier })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);
                resultEl.textContent = data.message;
                resultEl.className = 'tool-result';
            } catch (e) {
                resultEl.textContent = 'Erro: ' + e.message;
                resultEl.className = 'tool-result error';
            }
        }

        // ========== VERIFICAR MODIFICADOR ==========
        async function checkModifier() {
            const username = document.getElementById('checkModifierUsername').value.trim();
            const resultEl = document.getElementById('checkModifierResult');
            if (!username) {
                resultEl.textContent = 'Digite o username.';
                resultEl.className = 'tool-result error';
                return;
            }
            resultEl.textContent = 'Verificando...';
            resultEl.className = 'tool-result';
            try {
                // Usa a rota de perfil (admin pode ver qualquer um através do search-txid, 
                // mas precisamos de uma forma de obter o modificador. Vamos usar a rota de login 
                // para obter o token e depois o perfil – mas é mais fácil criar uma rota específica.
                // Como o backend já retorna catchModifier no perfil, podemos fazer a chamada 
                // usando a API pública de perfil, mas precisamos de autenticação.
                // Vou usar a mesma lógica: obter o perfil do usuário.
                const res = await fetch(`${API_URL}/user/profile`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                // Isso retorna o perfil do admin logado. Para obter de outro usuário,
                // precisamos de uma nova rota. Vou simular uma busca no banco de dados local
                // usando a rota de search-txid para encontrar o username e depois pegar o modificador
                // Mas a maneira correta é criar uma rota admin/get-user-modifier/:username
                // Por enquanto, vou criar uma chamada genérica.
                // Na verdade, podemos usar a rota de search-txid com um truque: buscar uma transação 
                // desse usuário e então fazer outra chamada. Melhor criar uma rota rápida.
                // Para já resolver, vou adicionar uma rota temporária no backend:
                // GET /admin/user-modifier/:username
                // Mas como você está cansado, vou usar um método alternativo:
                // Fazer login como o usuário (não recomendado) ou usar a rota de perfil do próprio usuário.
                // A melhor solução: adicionar a rota no backend rapidamente.
                // Vou instruir você a adicionar essa rota no backend, mas para agora, 
                // vou fazer a verificação usando a API pública de transactions para encontrar o username
                // e depois usar o endpoint de perfil do admin (que não serve).
                // Vou simular com um alerta pedindo para adicionar a rota.
                alert('Para verificar o modificador de outro jogador, adicione a rota:\nGET /admin/user-modifier/:username\nno backend. Retorne { catchModifier }.');
            } catch (e) {
                resultEl.textContent = 'Erro: ' + e.message;
                resultEl.className = 'tool-result error';
            }
        }

        // ========== RESETAR MODIFICADOR ==========
        async function resetModifier() {
            const username = document.getElementById('checkModifierUsername').value.trim();
            const resultEl = document.getElementById('checkModifierResult');
            if (!username) {
                resultEl.textContent = 'Digite o username.';
                resultEl.className = 'tool-result error';
                return;
            }
            resultEl.textContent = 'Resetando...';
            resultEl.className = 'tool-result';
            try {
                const res = await fetch(`${API_URL}/admin/set-catch-modifier`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ username, modifier: 0 })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);
                resultEl.textContent = `Modificador de ${username} resetado para 0%.`;
                resultEl.className = 'tool-result';
            } catch (e) {
                resultEl.textContent = 'Erro: ' + e.message;
                resultEl.className = 'tool-result error';
            }
        }

        function logout() {
            localStorage.removeItem('admin_token');
            token = '';
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }

        // Auto-login
        (function() {
            const saved = localStorage.getItem('admin_token');
            if (saved) {
                token = saved;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadTransactions();
            }
        })();
    </script>
</body>
</html>
