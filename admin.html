<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin – Poke Fish</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD966;
            --gold-dark: #3A2E1C;
            --bg: #1a0f08;
            --panel: #2c1f14;
            --border: #5C3E2C;
        }
        * { margin: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
        }
        .hidden { display: none !important; }

        /* Login */
        .login-card {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .login-card h2 {
            color: var(--gold);
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #2a1f14;
            color: #eee;
            font-size: 14px;
        }
        .login-card button {
            background: var(--gold);
            color: #1a0f08;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: 0.2s;
        }
        .login-card button:hover { opacity: 0.85; }
        .msg { color: #ff6b6b; margin-top: 10px; font-size: 13px; }

        /* Painel */
        .panel {
            background: var(--panel);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(255, 215, 100, 0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .header h1 {
            font-family: 'Press Start 2P', cursive;
            color: var(--gold);
            font-size: 16px;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .logout-btn:hover { background: #ff6b6b; color: #000; }

        /* Abas */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: #2a1f14;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            color: #ccc;
            font-weight: bold;
        }
        .tab.active {
            background: var(--gold);
            color: #1a0f08;
            border-color: var(--gold);
        }

        /* Cards */
        .transactions-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .tx-card {
            background: #1f140e;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            transition: 0.2s;
        }
        .tx-card:hover { border-color: var(--gold); }
        .tx-info p { margin: 4px 0; font-size: 14px; }
        .tx-info strong { color: var(--gold); }
        .detail-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .detail-btn:hover { background: var(--gold); color: #000; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .modal {
            background: var(--panel);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            position: relative;
        }
        .modal h3 {
            color: var(--gold);
            margin-bottom: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
        }
        .modal p { margin: 8px 0; }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .approve, .reject {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .approve { background: #4CAF50; color: white; }
        .reject { background: #e74c3c; color: white; }
        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            background: none;
            border: none;
            color: #ccc;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login -->
        <div id="loginScreen" class="login-card">
            <h2>Painel Admin</h2>
            <input id="adminUser" placeholder="Usuário">
            <input id="adminPass" type="password" placeholder="Senha">
            <button onclick="doLogin()">Entrar</button>
            <div id="loginMsg" class="msg"></div>
        </div>

        <!-- Painel -->
        <div id="adminPanel" class="panel hidden">
            <div class="header">
                <h1>🎣 Poke Fish</h1>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('deposit')">Depósitos</div>
                <div class="tab" onclick="switchTab('withdraw')">Saques</div>
            </div>

            <div id="depositList" class="transactions-list"></div>
            <div id="withdrawList" class="transactions-list hidden"></div>
            <div id="panelMsg" class="msg" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- Modal genérico -->
    <div id="txModal" class="modal-overlay hidden">
        <div class="modal">
            <button class="close-modal" onclick="closeModal()">✖</button>
            <h3 id="modalTitle"></h3>
            <div id="modalContent"></div>
            <div class="modal-actions">
                <button class="reject" onclick="processTx('rejected')">❌ Rejeitar</button>
                <button class="approve" onclick="processTx('approved')">✅ Aprovar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://pokefish-backend-production.up.railway.app/api';
        let token = '', currentTab = 'deposit', allTx = [], selectedTx = null;

        async function doLogin() {
            const u = document.getElementById('adminUser').value.trim();
            const p = document.getElementById('adminPass').value.trim();
            const msg = document.getElementById('loginMsg');
            if (!u || !p) return msg.textContent = 'Preencha os campos.';
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Erro');
                const payload = JSON.parse(atob(data.token.split('.')[1]));
                if (payload.role !== 'admin') throw new Error('Apenas admins.');
                token = data.token;
                localStorage.setItem('admin_token', token);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadTransactions();
            } catch (e) { msg.textContent = e.message; }
        }

        async function loadTransactions() {
            try {
                const res = await fetch(`${API_URL}/admin/transactions`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Erro ao carregar');
                allTx = await res.json();
                renderCards();
            } catch (e) {
                document.getElementById('panelMsg').textContent = e.message;
            }
        }

        function renderCards() {
            const depContainer = document.getElementById('depositList');
            const witContainer = document.getElementById('withdrawList');
            depContainer.innerHTML = '';
            witContainer.innerHTML = '';
            const deposits = allTx.filter(t => t.type === 'deposit');
            const withdraws = allTx.filter(t => t.type === 'withdraw');
            [deposits, withdraws].forEach((list, idx) => {
                const container = idx === 0 ? depContainer : witContainer;
                if (list.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">Nenhuma transação.</p>';
                    return;
                }
                list.forEach(tx => {
                    const card = document.createElement('div');
                    card.className = 'tx-card';
                    card.innerHTML = `
                        <div class="tx-info">
                            <p><strong>${tx.username}</strong> – ${tx.type === 'deposit' ? 'Depósito' : 'Saque'}</p>
                            <p>${tx.amountCoins} moedas ($${tx.amountUSD})</p>
                        </div>
                        <button class="detail-btn" onclick="openModal('${tx._id}')">Ver detalhes</button>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab === 'deposit' ? 'depositList' : 'withdrawList').classList.remove('hidden');
            document.getElementById(tab === 'withdraw' ? 'depositList' : 'withdrawList').classList.add('hidden');
            document.querySelector(`.tab:nth-child(${tab === 'deposit' ? 1 : 2})`).classList.add('active');
        }

        function openModal(id) {
            selectedTx = allTx.find(t => t._id === id);
            if (!selectedTx) return;
            document.getElementById('modalTitle').textContent = selectedTx.type === 'deposit' ? 'Depósito' : 'Saque';
            document.getElementById('modalContent').innerHTML = `
                <p><strong>Usuário:</strong> ${selectedTx.username}</p>
                <p><strong>Quantidade:</strong> ${selectedTx.amountCoins} moedas ($${selectedTx.amountUSD})</p>
                ${selectedTx.txid ? `<p><strong>TXID:</strong> <span id="modalTxid">${selectedTx.txid}</span> <button onclick="copyText('modalTxid')">📋</button></p>` : ''}
                ${selectedTx.wallet ? `<p><strong>Carteira:</strong> <span id="modalWallet">${selectedTx.wallet}</span> <button onclick="copyText('modalWallet')">📋</button></p>` : ''}
            `;
            document.getElementById('txModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('txModal').classList.add('hidden'); selectedTx = null; }

        async function processTx(action) {
            if (!selectedTx) return;
            try {
                const res = await fetch(`${API_URL}/admin/approve`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ transactionId: selectedTx._id, action })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);
                document.getElementById('panelMsg').textContent = `Transação ${action === 'approved' ? 'aprovada' : 'rejeitada'}!`;
                closeModal();
                loadTransactions();
            } catch (e) { alert('Erro: ' + e.message); }
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => alert('Copiado!'));
        }

        function logout() {
            localStorage.removeItem('admin_token');
            token = '';
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }

        // Auto-login
        (function() {
            const saved = localStorage.getItem('admin_token');
            if (saved) {
                token = saved;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadTransactions();
            }
        })();
    </script>
</body>
</html>
